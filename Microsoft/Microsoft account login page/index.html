<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Microsoft account creation</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div id="background">
    <div id="container">
        <div id="img-head">
          <img src="./microsoft.webp" alt="">
          <h4>Microsoft</h4>
        </div>
        <div class="actions" id="signin">
          <h2>Create your Microsoft account</h2>
        </div>
        <div class="actions" id="use">
          <p>Enter your email address</p>
        </div>
        <div class="actions">
          <input type="email" placeholder="Email" >
        </div>
        <div class="actions"class="actions" id="ntn">
          <button id="btn">Next</button>
        </div>
        <div class="actions" id="newto"><p>Already have an account?</p><a href="../Microsoft/index.html">Sign in</a></div>
    </div>
  </div>
