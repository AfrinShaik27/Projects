<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Microsoft Login</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div id="background">
    <div id="container">
        <div id="img-head">
          <img src="./microsoft.webp" alt="">
          <h4>Microsoft</h4>
        </div>
        <div class="actions" id="signin">
          <h2>Sign in</h2>
        </div>
        <div class="actions" id="use">
          <p>Use your Microsoft account</p>
        </div>
        <div class="actions">
          <input type="text"  placeholder="Email or phone number" id="emailphone" >
        </div>
        <div id="forget">
          <a href="">Forget your username?</a>
        </div>
        <div class="actions"class="actions" id="ntn">
          <button id="btn" onclick="next()">Next</button>
        </div>
        <div class="actions" id="newto"><p>New to Microsoft?</p><a href="../Microsoftaccountloginpage/index.html">Create an account</a></div>
    </div>
  </div>
  <script src="app.js"></script>
  
</body>
</html>
